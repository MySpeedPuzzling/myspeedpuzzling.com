<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    My Speed Puzzling — Rank Icon Sprite
    Usage: <svg class="rank-icon"><use href="rank-icons-sprite.svg#rank-enthusiast"/></svg>
    All icons use currentColor for stroke/fill, so set color via CSS.
    ViewBox: 0 0 24 24 | Stroke style: round caps & joins
  -->

  <!-- Locked — Circle + padlock (gray) -->
  <symbol id="rank-locked" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <rect x="8.5" y="11" width="7" height="5.5" rx="1"/>
    <path d="M10 11V9a2 2 0 0 1 4 0v2"/>
  </symbol>

  <!-- T0 Unknown — Circle + question mark (gray) -->
  <symbol id="rank-unknown" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <path d="M9.5 9.5a2.5 2.5 0 0 1 4.6 1.3c0 1.5-2.1 2-2.1 3.2"/>
    <circle cx="12" cy="17" r="0.5" fill="currentColor" stroke="none"/>
  </symbol>

  <!-- T1 Enthusiast — Circle + 1 chevron -->
  <symbol id="rank-enthusiast" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <polyline points="8 13 12 9 16 13"/>
  </symbol>

  <!-- T2 Apprentice — Circle + 2 chevrons -->
  <symbol id="rank-apprentice" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <polyline points="8 11.5 12 7.5 16 11.5"/>
    <polyline points="8 15.5 12 11.5 16 15.5"/>
  </symbol>

  <!-- T3 Proficient — Circle + 3 chevrons -->
  <symbol id="rank-proficient" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <polyline points="8 10 12 6 16 10"/>
    <polyline points="8 13.5 12 9.5 16 13.5"/>
    <polyline points="8 17 12 13 16 17"/>
  </symbol>

  <!-- T4 Advanced — Pentagon + 1 chevron -->
  <symbol id="rank-advanced" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2, 22 9, 18.5 21, 5.5 21, 2 9"/>
    <polyline points="8 13.5 12 9.5 16 13.5"/>
  </symbol>

  <!-- T5 Expert — Pentagon + 2 chevrons -->
  <symbol id="rank-expert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2, 22 9, 18.5 21, 5.5 21, 2 9"/>
    <polyline points="8 12 12 8 16 12"/>
    <polyline points="8 16 12 12 16 16"/>
  </symbol>

  <!-- T6 Master — Pentagon + filled star -->
  <symbol id="rank-master" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2, 22 9, 18.5 21, 5.5 21, 2 9"/>
    <polygon points="12 6 13.8 9.8 18 10.2 15 12.7 15.8 16.8 12 14.5 8.2 16.8 9 12.7 6 10.2 10.2 9.8" fill="currentColor" stroke="currentColor" stroke-width="1.2"/>
  </symbol>

  <!-- T7 Legend — Shield + filled crown (scaled 0.7) -->
  <symbol id="rank-legend" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2l8.5 3.5v5.5c0 5.2-3.7 8.8-8.5 11.2-4.8-2.4-8.5-6-8.5-11.2V5.5L12 2z" stroke="currentColor" stroke-width="1.6"/>
    <g transform="translate(3.6 3) scale(0.7)">
      <path d="m12 6 4 6 5-4-2 10H5L3 8l5 4z" fill="currentColor" stroke="currentColor" stroke-width="1.4"/>
    </g>
  </symbol>
</svg>
