<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    My Speed Puzzling — Difficulty Icon Sprite
    Usage: <svg class="diff-icon"><use href="difficulty-icons-sprite.svg#diff-very-easy"/></svg>
    All icons use currentColor for stroke/fill, so set color via CSS.
    ViewBox: 0 0 24 24 | Stroke style: round caps & joins
    Concept: Rounded square container with bidirectional chevron gauge
  -->

  <!-- T1 Very Easy — 2× chevron down -->
  <symbol id="diff-very-easy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <polyline points="8 8.5 12 12.5 16 8.5"/>
    <polyline points="8 12.5 12 16.5 16 12.5"/>
  </symbol>

  <!-- T2 Easy — 1× chevron down -->
  <symbol id="diff-easy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <polyline points="8 10 12 14 16 10"/>
  </symbol>

  <!-- T3 Average — filled dot (neutral) -->
  <symbol id="diff-average" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
  </symbol>

  <!-- T4 Challenging — 1× chevron up -->
  <symbol id="diff-challenging" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <polyline points="8 14 12 10 16 14"/>
  </symbol>

  <!-- T5 Hard — 2× chevron up -->
  <symbol id="diff-hard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <polyline points="8 15.5 12 11.5 16 15.5"/>
    <polyline points="8 11.5 12 7.5 16 11.5"/>
  </symbol>

  <!-- T6 Very Hard — 3× chevron up -->
  <symbol id="diff-very-hard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <polyline points="8 17 12 13 16 17"/>
    <polyline points="8 13.5 12 9.5 16 13.5"/>
    <polyline points="8 10 12 6 16 10"/>
  </symbol>

  <!-- Unknown — question mark -->
  <symbol id="diff-unknown" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <path d="M9.5 9.5a2.5 2.5 0 0 1 4.9.5c0 1.5-2.4 2-2.4 3.5"/>
    <circle cx="12" cy="16.5" r="0.01" stroke-width="2.5"/>
  </symbol>

  <!-- Locked — padlock -->
  <symbol id="diff-locked" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <rect x="8" y="11" width="8" height="6.5" rx="1.5"/>
    <path d="M10 11V9a2 2 0 0 1 4 0v2"/>
  </symbol>
</svg>
