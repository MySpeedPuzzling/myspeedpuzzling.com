        <p>Děkujeme za váš nápad — právě vaše zpětná vazba dělá MySpeedPuzzling lepším pro všechny!</p>
    admin_comment: |
        <p><strong>Komentář od týmu:</strong> %adminComment%</p>
    github_note: |
        <p>Jelikož vyvíjíme veřejně a jsme 100% transparentní, pokud vás zajímá kód a technické detaily této změny, klidně se <a href="%githubUrl%" class="link-underline">podívejte na GitHub</a>. Jinak to klidně ignorujte :)</p>
    upvoter:
        subject: "Návrh na funkci, který jste podpořili, byl vydán: %title%"
        title: "Funkce, kterou jste podpořili, je živá!"
        content: |
