        <p>Pokud máte dotazy nebo byste to chtěli probrat, kontaktujte nás na <a href="mailto:jan@myspeedpuzzling.com">jan@myspeedpuzzling.com</a>.</p>

oauth2_client_request:
    subject: "Nová žádost o OAuth2 klienta: %clientName%"
