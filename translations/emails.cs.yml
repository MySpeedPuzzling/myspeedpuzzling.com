oauth2_client_approved:
    subject: "Vaše API aplikace byla schválena!"
    title: "Vaše aplikace byla schválena!"
    content: |
        <p>Skvělá zpráva! Vaše OAuth2 aplikace <strong>%clientName%</strong> byla schválena.</p>
        <p>Klikněte na odkaz níže pro získání vašich přihlašovacích údajů. Odkaz je platný 7 dní.</p>
        <p><strong>Důležité:</strong> Vaše přihlašovací údaje budou zobrazeny pouze jednou. Ujistěte se, že je uložíte na bezpečné místo.</p>
