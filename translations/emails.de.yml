footer_tagline: "Die Speed Puzzling Community"
footer: 'Vielen Dank, dass du Teil von <a href="%homepageLink%">MySpeedPuzzling.com</a> bist.<br>Wenn du Fragen hast, zögere nicht, uns jederzeit unter <a href="mailto:simona@speedpuzzling.cz">simona@speedpuzzling.cz</a> zu kontaktieren.'

membership_cancelled:
    subject: "Mitgliedschafts-Abonnement auf MySpeedPuzzling.com wurde gekündigt"
    title: "Mitgliedschafts-Abonnement wurde gekündigt!"
    content: |
        <p>Es tut uns leid, dich gehen zu sehen, aber wir schätzen die Zeit, die du mit MySpeedPuzzling.com verbracht hast.</p>
        <p>Keine Sorge, dir werden keine weiteren Kosten berechnet. Deine Mitgliedschaft bleibt jedoch aktiv bis zum Ende der aktuellen Abrechnungsperiode, die am <b>%membershipExpiresAt%</b> endet.</p>
        <p>Wenn du deine Meinung änderst, kannst du deine Mitgliedschaft jederzeit auf der <a href="%membershipUrl%">Mitgliedschaftsseite</a> verwalten.</p>
        <p>Wir arbeiten ständig daran, MySpeedPuzzling.com zu verbessern, und würden uns sehr über Feedback oder Ideen von dir freuen.</p>
        <p>Vielen Dank, dass du Teil von MySpeedPuzzling.com warst, und wir hoffen, dich eines Tages wieder begrüßen zu können! :)</p>

membership_granted:
    subject: "Herzlichen Glückwunsch zu deiner Mitgliedschaft bei MySpeedPuzzling.com"
    title: "Deine Mitgliedschaft ist jetzt aktiv!"
    content: |
        <p>Wir sind begeistert, deinen Beitrag und deine Bemühungen in der Speed Puzzling Community zu würdigen!</p>
        <p>Als Zeichen unserer Anerkennung haben wir dir eine Mitgliedschaft auf MySpeedPuzzling.com gewährt. Deine Mitgliedschaft bleibt aktiv bis: <b>%membershipExpiresAt%</b>.</p>
        <p>Du kannst deine Mitgliedschaft jederzeit auf der <a href="%membershipUrl%">Mitgliedschaftsseite</a> überprüfen und verwalten.</p>
        <p>Vielen Dank, dass du ein so wertvoller Teil der Speed Puzzling Community bist. Puzzle weiter und inspiriere andere Puzzler!</p>

membership_subscribed:
    subject: "Herzlichen Glückwunsch zu deiner Mitgliedschaft bei MySpeedPuzzling.com"
    title: "Vielen Dank, dass du zu uns gestoßen bist!"
    content: |
        <h4>Deine Mitgliedschaft ist jetzt aktiv.</h4>
        <p>Wir schätzen deine Unterstützung sehr und freuen uns, dich als Mitglied von MySpeedPuzzling.com willkommen zu heißen!</p>
        <p>Deine nächste Abrechnungsperiode beginnt am: <b>%nextBillingPeriod%</b>.</p>
        <p>Du kannst dein Abonnement verwalten, die Mitgliedschaft kündigen oder Rechnungen jederzeit auf der <a href="%membershipUrl%">Mitgliedschaftsseite</a> herunterladen.</p>
        <p>Vielen Dank, dass du Teil von MySpeedPuzzling.com bist und für deine Unterstützung. Wir wünschen dir viel schnelles Speed Puzzling und fantastische Ergebnisse!</p>

subscription_payment_failed:
    subject: "Mitgliedschafts-Zahlung auf MySpeedPuzzling.com fehlgeschlagen"
    title: "Mitgliedschafts-Zahlung fehlgeschlagen!"
    content: |
        <p>Wir haben bemerkt, dass deine letzte Mitgliedschafts-Zahlung nicht erfolgreich war. Es könnte ein Problem mit deiner Zahlungsmethode gegeben haben.</p>
        <p>Wenn du deine Mitgliedschaft aktiv halten möchtest, überprüfe und aktualisiere bitte deine Zahlungsmethode auf der <a href="%billingPortalUrl%">Abrechnungsportal-Seite</a>.</p>
        <p>Wenn die Zahlung weiterhin fehlschlägt, wird deine Mitgliedschaft nach einigen weiteren Versuchen deaktiviert. Wir hoffen, dass du bei MySpeedPuzzling.com bleibst!</p>

subscription_renewed:
    subject: "Mitgliedschafts-Zahlung auf MySpeedPuzzling.com war erfolgreich"
    title: "Zahlung erfolgreich, vielen Dank!"
    content: |
        <p>Vielen Dank, dass du bei uns bleibst und Teil von MySpeedPuzzling.com bist!</p>
        <p>Wir freuen uns, dir mitteilen zu können, dass deine Mitgliedschaft erfolgreich erneuert wurde. Deine nächste Abrechnungsperiode beginnt am: <b>%nextBillingPeriod%</b>.</p>
        <p>Wenn du die Details deines Abonnements aktualisieren oder überprüfen möchtest, kannst du dies auf der <a href="%membershipUrl%">Mitgliedschaftsseite</a> tun.</p>
        <p>Wir arbeiten ständig daran, neue Funktionen für unsere Mitglieder zu verbessern und hinzuzufügen. Wenn es etwas gibt, was wir besser machen können, lass es uns wissen.</p>
        <p>Nochmals vielen Dank für deine Unterstützung. Wir wünschen dir viel schnelles Speed Puzzling und fantastische Ergebnisse!</p>

unread_messages:
    subject: "Jemand hat dir auf MySpeedPuzzling geschrieben"
    title: "Du hast neue Nachrichten, die auf dich warten"
    greeting: "Hallo %playerName%,"
    intro: "Seit deinem letzten Besuch hat sich jemand bei dir gemeldet. Hier ist, was auf dich wartet:"
    message_line: "%count% neue Nachricht(en) von %senderName%"
    message_line_with_puzzle: "%count% neue Nachricht(en) von %senderName% zu %puzzleName%"
    view_messages: "Nachrichten lesen"
    pending_requests_also: "Du hast auch %count% neue Konversationsanfrage(n) — jemand möchte sich mit dir verbinden!"
    pending_requests_only: "Jemand möchte dich erreichen! Du hast %count% neue Konversationsanfrage(n), die auf deine Genehmigung warten."
    pending_requests_context: "Es könnte um ein Puzzle vom Marktplatz gehen, eine Frage zu deiner Sammlung oder einfach ein Gruß von einem Puzzler."
    view_requests: "Konversationsanfragen ansehen"
    opt_out: 'Du kannst diese E-Mail-Benachrichtigungen in deinen <a href="%settingsUrl%">Profileinstellungen</a> verwalten.'

oauth2_client_request:
    subject: "Neue OAuth2-Client-Anfrage: %clientName%"
    title: "Neue API-Zugriffsanfrage"
    content: |
        <p>Eine neue OAuth2-Client-Zugriffsanfrage wurde eingereicht.</p>
        <p><strong>Antragsteller:</strong> %playerName%<br><strong>Anwendung:</strong> %clientName%</p>
        <p><strong>Zweck:</strong> %purpose%</p>
        <p><a href="%adminUrl%">Diese Anfrage in der Verwaltung prüfen</a></p>

oauth2_client_approved:
    subject: "Deine API-Anwendung wurde genehmigt!"
    title: "Deine Anwendung wurde genehmigt!"
    content: |
        <p>Tolle Neuigkeiten! Deine OAuth2-Anwendung <strong>%clientName%</strong> wurde genehmigt.</p>
        <p>Klicke auf den Link unten, um deine Zugangsdaten abzurufen. Der Link ist 7 Tage gültig.</p>
        <p><strong>Wichtig:</strong> Deine Zugangsdaten werden nur einmal angezeigt. Stelle sicher, dass du sie an einem sicheren Ort speicherst.</p>
        <p><a href="%claimUrl%">Zugangsdaten abrufen</a></p>

oauth2_client_rejected:
    subject: "Deine API-Anwendungsanfrage wurde nicht genehmigt"
    title: "Anwendung nicht genehmigt"
    content: |
        <p>Leider wurde deine OAuth2-Anwendungsanfrage für <strong>%clientName%</strong> nicht genehmigt.</p>
        <p><strong>Grund:</strong> %reason%</p>
        <p>Wenn du Fragen hast oder dies weiter besprechen möchtest, kontaktiere uns bitte unter <a href="mailto:jan@myspeedpuzzling.com">jan@myspeedpuzzling.com</a>.</p>

competition_submitted:
    subject: "Neue Veranstaltung eingereicht: %competitionName%"
    title: "Neue Veranstaltung eingereicht"
    content: |
        <p>Eine neue Veranstaltung wurde zur Genehmigung eingereicht.</p>
        <p><strong>Eingereicht von:</strong> %playerName%<br><strong>Veranstaltung:</strong> %competitionName%<br><strong>Ort:</strong> %location%</p>
        <p><a href="%adminUrl%">Ausstehende Veranstaltungen in der Verwaltung prüfen</a></p>

competition_approved:
    subject: "Ihre Veranstaltung wurde genehmigt!"
    title: "Ihre Veranstaltung wurde genehmigt!"
    content: |
        <p>Tolle Neuigkeiten! Ihre Veranstaltung <strong>%competitionName%</strong> wurde genehmigt und ist jetzt öffentlich auf MySpeedPuzzling sichtbar.</p>
        <p><a href="%eventUrl%">Veranstaltungsseite anzeigen</a></p>

competition_rejected:
    subject: "Ihre Veranstaltung wurde nicht genehmigt"
    title: "Veranstaltung nicht genehmigt"
