    outro: "Level schalten nichts frei und XP lassen sich niemals kaufen — es ist einfach deine Puzzle-Geschichte, gefeiert. Wir sehen uns am Tisch! 🧩"
    explainer: 'Neugierig auf die Details? <a href="%explainerUrl%">So funktionieren XP &amp; Level</a>.'
