footer_tagline: "The Speed Puzzling Community"
footer: 'Thank you for being part of <a href="%homepageLink%">MySpeedPuzzling.com</a>.<br>If you have any questions, feel free to contact us anytime at <a href="mailto:simona@speedpuzzling.cz">simona@speedpuzzling.cz</a>.'

membership_cancelled:
    subject: "Membership subscription on MySpeedPuzzling.com has been canceled"
    title: "Membership subscription has been canceled!"
    content: |
        <p>We're sorry to see you go, but we appreciate the time you spent with MySpeedPuzzling.com.</p>
        <p>Don't worry, you won't be charged any further. However, your membership will remain active until the end of the current billing period, which ends on <b>%membershipExpiresAt%</b>.</p>
        <p>If you change your mind, you can manage your membership anytime on the <a href="%membershipUrl%">membership page</a>.</p>
        <p>We're constantly working to improve MySpeedPuzzling.com and would greatly appreciate any feedback or ideas you have.</p>
        <p>Thank you for being part of MySpeedPuzzling.com, and we hope to welcome you back someday! :)</p>

membership_granted:
    subject: "Congratulations on your membership at MySpeedPuzzling.com"
    title: "Your membership is now active!"
    content: |
        <p>We are thrilled to recognize your contribution and efforts in the Speed Puzzling community!</p>
        <p>As a token of our appreciation, we've granted you a membership on MySpeedPuzzling.com. Your membership will remain active until: <b>%membershipExpiresAt%</b>.</p>
        <p>You can check and manage your membership anytime on the <a href="%membershipUrl%">membership page</a>.</p>
        <p>Thank you for being such a valuable part of the Speed Puzzling community. Keep puzzling and inspiring other puzzlers!</p>

membership_subscribed:
    subject: "Congratulations on your membership at MySpeedPuzzling.com"
    title: "Thank you for joining us!"
    content: |
        <h4>Your membership is now active.</h4>
        <p>We deeply value your support and are excited to welcome you as a member of MySpeedPuzzling.com!</p>
        <p>Your next billing period begins on: <b>%nextBillingPeriod%</b>.</p>
        <p>You can manage your subscription, cancel membership, or download invoices anytime on the <a href="%membershipUrl%">membership page</a>.</p>
        <p>Thank you for being part of MySpeedPuzzling.com and for your support. We wish you lots of fast speed puzzling and amazing results!</p>

subscription_payment_failed:
    subject: "Membership payment on MySpeedPuzzling.com failed"
    title: "Membership payment failed!"
    content: |
        <p>We noticed that your recent membership payment was unsuccessful. There may have been an issue with your payment method.</p>
        <p>If you wish to keep your membership active, please check and update your payment method on the <a href="%billingPortalUrl%">billing portal page</a>.</p>
        <p>If the payment continues to fail, your membership will be deactivated after a few more attempts. We hope you’ll stay with MySpeedPuzzling.com!</p>

subscription_renewed:
    subject: "Membership payment on MySpeedPuzzling.com was successful"
    title: "Payment successful, thank you!"
    content: |
        <p>Thank you so much for staying with us and being part of MySpeedPuzzling.com!</p>
        <p>We're excited to inform you that your membership has been successfully renewed. Your next billing period begins on: <b>%nextBillingPeriod%</b>.</p>
        <p>If you'd like to update or review the details of your subscription, you can do so on the <a href="%membershipUrl%">membership page</a>.</p>
        <p>We're constantly working on improving and adding new features for our members. If there's anything we can do better, let us know.</p>
        <p>Once again, thank you for your support. We wish you lots of fast speed puzzling and amazing results!</p>

unread_messages:
    subject: "Someone messaged you on MySpeedPuzzling"
    title: "You have new messages waiting"
    greeting: "Hi %playerName%,"
    intro: "Someone reached out to you since your last visit. Here's what's waiting for you:"
    message_line: "%count% new message(s) from %senderName%"
    message_line_with_puzzle: "%count% new message(s) from %senderName% about %puzzleName%"
    view_messages: "Read your messages"
    pending_requests_also: "You also have %count% new conversation request(s) — someone wants to connect with you!"
    pending_requests_only: "Someone wants to reach you! You have %count% new conversation request(s) waiting for your approval."
    pending_requests_context: "These could be about a puzzle from the marketplace, a question about your collection, or just a fellow puzzler saying hi."
    view_requests: "Review conversation requests"
    opt_out: 'You can manage these email notifications in your <a href="%settingsUrl%">profile settings</a>.'

oauth2_client_request:
    subject: "New OAuth2 Client Request: %clientName%"
    title: "New API Access Request"
    content: |
        <p>A new OAuth2 client access request has been submitted.</p>
        <p><strong>Requester:</strong> %playerName%<br><strong>Application:</strong> %clientName%</p>
        <p><strong>Purpose:</strong> %purpose%</p>
        <p><a href="%adminUrl%">Review this request in admin</a></p>

oauth2_client_approved:
    subject: "Your API application has been approved!"
    title: "Your application has been approved!"
    content: |
        <p>Great news! Your OAuth2 application <strong>%clientName%</strong> has been approved.</p>
        <p>Click the link below to claim your credentials. The link is valid for 7 days.</p>
        <p><strong>Important:</strong> Your credentials will be shown only once. Make sure to save them in a secure location.</p>
        <p><a href="%claimUrl%">Claim your credentials</a></p>

oauth2_client_rejected:
    subject: "Your API application request was not approved"
    title: "Application not approved"
    content: |
        <p>Unfortunately, your OAuth2 application request for <strong>%clientName%</strong> was not approved.</p>
        <p><strong>Reason:</strong> %reason%</p>
        <p>If you have questions or would like to discuss this further, please contact us at <a href="mailto:jan@myspeedpuzzling.com">jan@myspeedpuzzling.com</a>.</p>

competition_submitted:
    subject: "New event submitted: %competitionName%"
    title: "New Event Submission"
    content: |
        <p>A new event has been submitted for approval.</p>
        <p><strong>Submitted by:</strong> %playerName%<br><strong>Event:</strong> %competitionName%<br><strong>Location:</strong> %location%</p>
        <p><a href="%adminUrl%">Review pending events in admin</a></p>

competition_approved:
    subject: "Your event has been approved!"
    title: "Your event has been approved!"
    content: |
        <p>Great news! Your event <strong>%competitionName%</strong> has been approved and is now publicly visible on MySpeedPuzzling.</p>
        <p><a href="%eventUrl%">View your event page</a></p>

competition_rejected:
    subject: "Your event submission was not approved"
    title: "Event not approved"
    content: |
        <p>Unfortunately, your event <strong>%competitionName%</strong> was not approved.</p>
        <p><strong>Reason:</strong> %reason%</p>
        <p>If you have questions or would like to discuss this further, please contact us at <a href="mailto:jan@myspeedpuzzling.com">jan@myspeedpuzzling.com</a>.</p>
