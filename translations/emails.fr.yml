footer_tagline: "La communauté Speed Puzzling"
footer: 'Merci de faire partie de <a href="%homepageLink%">MySpeedPuzzling.com</a>.<br>Si vous avez des questions, n''hésitez pas à nous contacter à tout moment à <a href="mailto:simona@speedpuzzling.cz">simona@speedpuzzling.cz</a>.'

membership_cancelled:
    subject: "L'abonnement adhésion sur MySpeedPuzzling.com a été annulé"
    title: "L'abonnement adhésion a été annulé !"
    content: |
        <p>Nous sommes désolés de vous voir partir, mais nous apprécions le temps que vous avez passé avec MySpeedPuzzling.com.</p>
        <p>Ne vous inquiétez pas, vous ne serez plus facturé. Cependant, votre adhésion restera active jusqu'à la fin de la période de facturation actuelle, qui se termine le <b>%membershipExpiresAt%</b>.</p>
        <p>Si vous changez d'avis, vous pouvez gérer votre adhésion à tout moment sur la <a href="%membershipUrl%">page adhésion</a>.</p>
        <p>Nous travaillons constamment pour améliorer MySpeedPuzzling.com et apprécierions grandement tous commentaires ou idées que vous pourriez avoir.</p>
        <p>Merci de faire partie de MySpeedPuzzling.com, et nous espérons vous accueillir de nouveau un jour ! :)</p>

membership_granted:
    subject: "Félicitations pour votre adhésion à MySpeedPuzzling.com"
    title: "Votre adhésion est maintenant active !"
    content: |
        <p>Nous sommes ravis de reconnaître votre contribution et vos efforts dans la communauté Speed Puzzling !</p>
        <p>En signe de notre appréciation, nous vous avons accordé une adhésion sur MySpeedPuzzling.com. Votre adhésion restera active jusqu'au : <b>%membershipExpiresAt%</b>.</p>
        <p>Vous pouvez vérifier et gérer votre adhésion à tout moment sur la <a href="%membershipUrl%">page adhésion</a>.</p>
        <p>Merci d'être un membre si précieux de la communauté Speed Puzzling. Continuez à résoudre des puzzles et à inspirer d'autres puzzleurs !</p>

membership_subscribed:
    subject: "Félicitations pour votre adhésion à MySpeedPuzzling.com"
    title: "Merci de nous avoir rejoint !"
    content: |
        <h4>Votre adhésion est maintenant active.</h4>
        <p>Nous apprécions profondément votre soutien et sommes ravis de vous accueillir en tant que membre de MySpeedPuzzling.com !</p>
        <p>Votre prochaine période de facturation commence le : <b>%nextBillingPeriod%</b>.</p>
        <p>Vous pouvez gérer votre abonnement, annuler l'adhésion ou télécharger les factures à tout moment sur la <a href="%membershipUrl%">page adhésion</a>.</p>
        <p>Merci de faire partie de MySpeedPuzzling.com et pour votre soutien. Nous vous souhaitons beaucoup de speed puzzling rapide et d'excellents résultats !</p>

subscription_payment_failed:
    subject: "Le paiement de l'adhésion sur MySpeedPuzzling.com a échoué"
    title: "Le paiement de l'adhésion a échoué !"
    content: |
        <p>Nous avons remarqué que votre paiement récent d'adhésion n'a pas réussi. Il pourrait y avoir eu un problème avec votre méthode de paiement.</p>
        <p>Si vous souhaitez maintenir votre adhésion active, veuillez vérifier et mettre à jour votre méthode de paiement sur la <a href="%billingPortalUrl%">page du portail de facturation</a>.</p>
        <p>Si le paiement continue d'échouer, votre adhésion sera désactivée après quelques tentatives supplémentaires. Nous espérons que vous resterez avec MySpeedPuzzling.com !</p>

subscription_renewed:
    subject: "Le paiement de l'adhésion sur MySpeedPuzzling.com a réussi"
    title: "Paiement réussi, merci !"
    content: |
        <p>Merci beaucoup de rester avec nous et de faire partie de MySpeedPuzzling.com !</p>
        <p>Nous sommes ravis de vous informer que votre adhésion a été renouvelée avec succès. Votre prochaine période de facturation commence le : <b>%nextBillingPeriod%</b>.</p>
        <p>Si vous souhaitez mettre à jour ou réviser les détails de votre abonnement, vous pouvez le faire sur la <a href="%membershipUrl%">page adhésion</a>.</p>
        <p>Nous travaillons constamment à l'amélioration et à l'ajout de nouvelles fonctionnalités pour nos membres. S'il y a quelque chose que nous pouvons faire mieux, faites-le nous savoir.</p>
        <p>Encore une fois, merci pour votre soutien. Nous vous souhaitons beaucoup de speed puzzling rapide et d'excellents résultats !</p>

unread_messages:
    subject: "Quelqu'un vous a écrit sur MySpeedPuzzling"
    title: "Vous avez de nouveaux messages en attente"
    greeting: "Bonjour %playerName%,"
    intro: "Quelqu'un vous a contacté depuis votre dernière visite. Voici ce qui vous attend :"
    message_line: "%count% nouveau(x) message(s) de %senderName%"
    message_line_with_puzzle: "%count% nouveau(x) message(s) de %senderName% à propos de %puzzleName%"
    view_messages: "Lire vos messages"
    pending_requests_also: "Vous avez également %count% nouvelle(s) demande(s) de conversation — quelqu'un souhaite échanger avec vous !"
    pending_requests_only: "Quelqu'un souhaite vous contacter ! Vous avez %count% nouvelle(s) demande(s) de conversation en attente de votre approbation."
    pending_requests_context: "Il pourrait s'agir d'un puzzle du marketplace, d'une question sur votre collection, ou simplement d'un puzzleur qui dit bonjour."
    view_requests: "Voir les demandes de conversation"
    opt_out: 'Vous pouvez gérer ces notifications par e-mail dans les <a href="%settingsUrl%">paramètres de votre profil</a>.'

oauth2_client_request:
    subject: "Nouvelle demande de client OAuth2 : %clientName%"
    title: "Nouvelle demande d''accès API"
    content: |
        <p>Une nouvelle demande d'accès client OAuth2 a été soumise.</p>
        <p><strong>Demandeur :</strong> %playerName%<br><strong>Application :</strong> %clientName%</p>
        <p><strong>Objectif :</strong> %purpose%</p>
        <p><a href="%adminUrl%">Examiner cette demande dans l'administration</a></p>

oauth2_client_approved:
    subject: "Votre application API a été approuvée !"
    title: "Votre application a été approuvée !"
    content: |
        <p>Bonne nouvelle ! Votre application OAuth2 <strong>%clientName%</strong> a été approuvée.</p>
        <p>Cliquez sur le lien ci-dessous pour récupérer vos identifiants. Le lien est valide pendant 7 jours.</p>
        <p><strong>Important :</strong> Vos identifiants ne seront affichés qu'une seule fois. Assurez-vous de les enregistrer dans un endroit sécurisé.</p>
        <p><a href="%claimUrl%">Récupérer vos identifiants</a></p>

oauth2_client_rejected:
    subject: "Votre demande d''application API n''a pas été approuvée"
    title: "Application non approuvée"
    content: |
        <p>Malheureusement, votre demande d'application OAuth2 pour <strong>%clientName%</strong> n'a pas été approuvée.</p>
        <p><strong>Raison :</strong> %reason%</p>
        <p>Si vous avez des questions ou souhaitez en discuter davantage, veuillez nous contacter à <a href="mailto:jan@myspeedpuzzling.com">jan@myspeedpuzzling.com</a>.</p>

competition_submitted:
    subject: "Nouvel événement soumis : %competitionName%"
    title: "Nouvel événement soumis"
    content: |
        <p>Un nouvel événement a été soumis pour approbation.</p>
        <p><strong>Soumis par :</strong> %playerName%<br><strong>Événement :</strong> %competitionName%<br><strong>Lieu :</strong> %location%</p>
        <p><a href="%adminUrl%">Examiner les événements en attente dans l'administration</a></p>

competition_approved:
    subject: "Votre événement a été approuvé !"
    title: "Votre événement a été approuvé !"
    content: |
        <p>Bonne nouvelle ! Votre événement <strong>%competitionName%</strong> a été approuvé et est maintenant visible publiquement sur MySpeedPuzzling.</p>
        <p><a href="%eventUrl%">Voir la page de l'événement</a></p>

competition_rejected:
    subject: "Votre événement n'a pas été approuvé"
    title: "Événement non approuvé"
    content: |
        <p>Malheureusement, votre événement <strong>%competitionName%</strong> n'a pas été approuvé.</p>
        <p><strong>Raison :</strong> %reason%</p>
        <p>Si vous avez des questions ou souhaitez en discuter, contactez-nous à <a href="mailto:jan@myspeedpuzzling.com">jan@myspeedpuzzling.com</a>.</p>

feature_request_status_changed:
    subject: "Votre demande de fonctionnalité a été mise à jour : %title%"
    title: "Mise à jour du statut de la demande"
    content: |
        <p>Votre demande de fonctionnalité <a href="%featureRequestUrl%"><strong>%featureRequestTitle%</strong></a> a été mise à jour.</p>
        <p>Le statut est passé de <strong>%oldStatus%</strong> à <strong>%newStatus%</strong>.</p>
    admin_comment: |
        <p><strong>Commentaire de l'équipe :</strong> %adminComment%</p>
    upvoter:
        subject: "Une demande de fonctionnalité que vous avez soutenue a été mise à jour : %title%"
        title: "Mise à jour du statut de la demande"
        content: |
            <p>Une demande de fonctionnalité que vous avez soutenue — <a href="%featureRequestUrl%"><strong>%featureRequestTitle%</strong></a> — a été mise à jour.</p>
            <p>Le statut est passé de <strong>%oldStatus%</strong> à <strong>%newStatus%</strong>.</p>
            <p>Merci de soutenir cette idée !</p>
        admin_comment: |
            <p><strong>Commentaire de l'équipe :</strong> %adminComment%</p>
    status:
        open: "Ouverte"
        in_progress: "En cours"
        completed: "Terminée"
        declined: "Refusée"
