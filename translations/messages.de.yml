"global_modal":
  "title": "Ranglistenpuzzeln ist da!"
  "text": "<p>Wir freuen uns, ein großes Update vorzustellen — alles rund um Ranking und Wettbewerb:</p>\n<ul class=\"ms-0\" style=\"list-style-type: disc;\"><li class=\"mt-2\"><strong>Puzzle-Schwierigkeit</strong> — berechnete Bewertungen basierend auf echten Lösungsdaten</li><li class=\"mt-2\"><strong>Einblicke & Vorhersagen</strong> — detaillierte Metriken mit personalisierten Zeitvorhersagen</li><li class=\"mt-2\"><strong>Puzzler-Stufen</strong> — von Anfänger bis Legendär, finden Sie heraus, wo Sie stehen</li><li class=\"mt-2\"><strong>MSP Rating Rangliste</strong> — kompetitives Ranking inspiriert vom Schach-Rating. Derzeit ist <strong>Wiktor unser erster MSP King</strong>. Herzlichen Glückwunsch!</li></ul>\n<p>Die Formeln, Stufen und Rating-Berechnungen <strong>können angepasst werden</strong>, wenn wir mehr Daten sammeln. Sie möchten nicht gerankt werden? Sie können sich <strong>jederzeit abmelden</strong> in Ihren Profileinstellungen.</p>\n"
