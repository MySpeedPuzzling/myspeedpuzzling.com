  "table_section_players": "Öffentliche Daten anderer Spieler"
  "summary_pat": "<i class=\"bi bi-key me-1 text-primary\"></i><strong>PAT</strong> — nur Ihre eigenen Daten. Keine Scopes erforderlich, voller Zugriff auf alle <code>/me</code>-Endpoints."
