"fair_use_policy":
    "meta":
        "title": "API-Richtlinie zur fairen Nutzung"
        "description": "API-Nutzungsregeln und Richtlinie zur fairen Nutzung für die MySpeedPuzzling-Plattform."
    "heading": "API-Richtlinie zur fairen Nutzung"
    "last_updated": "Zuletzt aktualisiert: 2. April 2026"
    "already_accepted": "Sie haben die API-Nutzungsrichtlinie bereits akzeptiert."
    "accept_button": "Ich akzeptiere die API-Nutzungsrichtlinie"
    "intro_title": "Willkommen, Entwickler"
    "intro_p1": "Wir freuen uns, unsere Daten der Puzzle-Community zu öffnen. Die MySpeedPuzzling API soll Entwicklern ermöglichen, kreative Integrationen, Tools und Erlebnisse zu erstellen — nicht dazu, unsere Plattform oder ihre Nutzer auszunutzen."
    "intro_p2": "Durch die Nutzung der API stimmen Sie den auf dieser Seite beschriebenen Bedingungen zu. Sie sind in einfacher Sprache verfasst, weil wir möchten, dass Sie sie tatsächlich lesen."
    "rate_limits_title": "Ratenbegrenzungen & Zugang"
    "rate_limits_p1": "Wir beginnen mit großzügigen Ratenbegrenzungen — wir möchten es einfach machen, mit unserer API zu entwickeln. Allerdings wird der gesamte Datenverkehr aktiv pro API-Schlüssel und pro IP-Adresse überwacht."
    "rate_limits_p2": "Wird eine übermäßige Nutzung festgestellt, werden Ratenbegrenzungen eingeführt und auf eine angemessene Anzahl festgelegt. Anhaltender Missbrauch oder das Überschreiten durchgesetzter Ratenbegrenzungen führt zur automatischen IP-Sperrung, die eine manuelle Entsperrung durch unser Team erfordert."
    "rate_limits_p3": "Versuche, Ratenbegrenzungen zu umgehen, indem Anfragen auf mehrere IPs verteilt, Proxys, VPNs, rotierende Infrastruktur oder mehrere API-Schlüssel verwendet werden, werden erkannt und als schwerwiegender Richtlinienverstoß behandelt."
    "rate_limits_p4": "Wenn Sie für ein legitimes Projekt höhere Limits benötigen, wenden Sie sich an uns — versuchen Sie nicht, das System zu umgehen."
    "rate_limits_p5": "Beachten Sie <code>Retry-After</code>-Header und implementieren Sie ein ordnungsgemäßes Backoff in Ihrem Client."
    "permitted_title": "Zulässige Nutzung"
    "permitted_personal": "Der API-Zugang ist <strong>ausschließlich für den persönlichen und nicht-kommerziellen Gebrauch</strong> bestimmt."
    "permitted_no_sell": "Es ist strengstens verboten, API-Daten ohne unsere ausdrückliche schriftliche Genehmigung zu verkaufen, weiterzuverkaufen, zu lizenzieren oder an Dritte weiterzugeben."
    "permitted_no_bulk": "Keine Aufzählung oder Massen-Downloads der gesamten Datenbank oder wesentlicher Teile davon."
    "permitted_no_scrape": "Kein Scraping der Website als Umgehung von API-Beschränkungen."
    "permitted_no_compete": "Die API darf nicht verwendet werden, um eine konkurrierende Plattform aufzubauen oder Kernfunktionen von MySpeedPuzzling zu replizieren (Bestenlisten, Ranglisten, Benutzerprofile als Dienst) — sofern dies nicht ausdrücklich beantragt und genehmigt wurde."
    "permitted_no_interfere": "Anwendungen dürfen die Plattformfunktionalität nicht beeinträchtigen oder die Erfahrung anderer Nutzer verschlechtern."
    "data_title": "Dateneigentum & Verarbeitung"
    "data_ownership": "Alle Daten bleiben Eigentum von MySpeedPuzzling und seinen Nutzern. Der API-Zugang gewährt eine Lizenz zur Nutzung der Daten, kein Eigentum daran."
    "data_personal": "Persönliche Daten der Nutzer (Profile, Lösungszeiten) dürfen nicht verwendet werden, um Personen außerhalb der Plattform ohne deren Zustimmung zu identifizieren, zu profilieren oder zu kontaktieren."
    "data_cache": "Gecachte Daten sollten nicht länger als 24 Stunden gespeichert werden — wir sind die maßgebliche Quelle."
    "data_misrepresent": "Daten dürfen nicht verändert, falsch dargestellt oder in einem irreführenden Kontext präsentiert werden."
    "keys_title": "API-Schlüssel & Kontoregeln"
    "keys_personal": "API-Schlüssel sind persönlich und nicht übertragbar. Keine Weitergabe."
    "keys_responsible": "Entwickler sind dafür verantwortlich, ihren Schlüssel sicher aufzubewahren und für alle Nutzung unter ihrem Schlüssel."
    "keys_no_automated": "Keine automatisierte Kontoerstellung zur Erlangung mehrerer API-Schlüssel."
    "monitoring_title": "Überwachung & Durchsetzung"
    "monitoring_active": "Die API-Nutzung wird aktiv überwacht — einschließlich Anfragetypen, Volumina, IP-Adressen und Zugriffsmuster."
    "monitoring_retention": "Überwachungsdaten (Anfrage-Logs, IP-Adressen, Nutzungsmuster) können für Sicherheits- und Missbrauchspräventionszwecke unbegrenzt aufbewahrt werden."
    "monitoring_revoke": "Wir behalten uns das Recht vor, den API-Zugang jederzeit ohne Vorankündigung zu widerrufen, wenn diese Richtlinie verletzt wird."
    "monitoring_circumvent": "Die Umgehung von Beschränkungen wird als Vertrauensbruch behandelt, der zur dauerhaften Sperrung führt."
    "attribution_title": "Quellenangabe"
    "attribution_mention": 'Wenn Sie Daten von MySpeedPuzzling in Ihrer Anwendung präsentieren, geben Sie bitte die Quelle an. Ein einfaches „Daten von MySpeedPuzzling" mit einem Link reicht aus.'
    "attribution_logo": "Verwenden Sie gerne unser Logo in Ihrem Projekt:"
    "attribution_download": "Logo herunterladen (SVG)"
    "attribution_link": "Verlinken Sie wo angebracht auf myspeedpuzzling.com."
    "tell_us_title": "Erzählen Sie uns, was Sie entwickeln"
    "tell_us_p1": "Wir würden wirklich gerne wissen, woran Sie arbeiten. Von Community-Projekten zu hören inspiriert uns und hilft uns, die API für alle zu verbessern."
    "tell_us_p2": "Eine kurze Beschreibung des Anwendungsfalls wird bei der Beantragung eines API-Schlüssels erbeten. Wir könnten coole Community-Projekte auf unserer Website vorstellen (natürlich mit Ihrer Erlaubnis)."
    "tell_us_p3": "Fragen, Ideen oder Feedback? Schreiben Sie uns an jan@myspeedpuzzling.com."
    "updates_title": "Richtlinienaktualisierungen"
    "updates_notice": "Wir behalten uns das Recht vor, diese Richtlinie mit angemessener Vorankündigung (30 Tage) zu aktualisieren. Die weitere Nutzung nach Änderungen gilt als Zustimmung."
    "updates_email": "Wesentliche Änderungen werden registrierten Entwicklern per E-Mail mitgeteilt."
    "contact_title": "Kontakt"
    "contact_info": "Für höhere Ratenbegrenzungen, Partnerschaftsanfragen, Anwendungsfall-Diskussionen oder Richtlinienfragen:"
    "closing": "Wir möchten, dass Sie erfolgreich sind. Spielen Sie fair und wir werden Sie unterstützen."
