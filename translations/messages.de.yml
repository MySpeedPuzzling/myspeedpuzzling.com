  "auth_title": "Authentifizierung"
  "auth_subtitle": "Zwei Möglichkeiten zur Authentifizierung bei der API, je nach Anwendungsfall."
  "auth_pat_title": "Personal Access Token"
  "auth_pat_description": "Generieren Sie einen Token für den programmatischen Zugriff auf <strong>Ihre eigenen Daten</strong>. Ideal für Home Assistant, persönliche Skripte und Automatisierungen."
  "auth_code_title": "OAuth2 — Benutzerauthentifizierung"
  "auth_code_description": "Authorization Code Flow für Drittanbieter-Apps. Benutzer autorisieren Ihre App, auf ihre Daten mit detaillierten Scopes zuzugreifen. Unterstützt Lese- und Schreiboperationen."
  "auth_client_title": "OAuth2 — Dienst"
  "auth_client_description": "Client Credentials Flow für die Kommunikation zwischen Diensten. Lesezugriff auf die Daten jedes öffentlichen Spielers ohne Benutzerinteraktion."
  "how_to_auth_title": "So authentifizieren Sie sich"
  "what_is_good_for": "Wofür ist das gut?"
  "pat_good_for": "Wenn Sie nur auf Ihre eigenen Daten zugreifen möchten. Perfekt für persönliche Automatisierungen — importieren Sie Ihre Ergebnisse in Home Assistant, zeigen Sie Ihre Statistiken auf einem persönlichen Dashboard an, verfolgen Sie Ihren Fortschritt in einer Tabelle oder erstellen Sie ein benutzerdefiniertes Benachrichtigungsskript."
  "pat_how_to": "Generieren Sie einen Token in Ihren <strong>Profileinstellungen</strong> und verwenden Sie ihn im <code>Authorization</code>-Header:"
  "pat_note": "PAT gibt Ihnen vollen Zugriff auf alle <code>/api/v1/me/*</code>-Endpoints. Keine Scopes erforderlich. Zugriff auf Daten anderer Spieler ist nicht möglich."
  "auth_code_flow_title": "OAuth2 Authorization Code Flow"
  "auth_code_good_for": "Wenn Sie eine App entwickeln, bei der sich Benutzer mit ihrem MySpeedPuzzling-Konto anmelden. Ihre App kann dann in ihrem Namen auf ihre Daten zugreifen — ihre Ergebnisse auf Ihrer Website anzeigen, ihnen ermöglichen, Lösezeiten über Ihr Wettbewerbstool hinzuzufügen, oder ihre Sammlungen über eine benutzerdefinierte Oberfläche verwalten."
  "auth_code_step1": "<strong>Schritt 1:</strong> Leiten Sie den Benutzer weiter, um Ihre App zu autorisieren:"
  "auth_code_step2": "<strong>Schritt 2:</strong> Tauschen Sie den Autorisierungscode gegen Tokens:"
  "auth_code_step3": "<strong>Schritt 3:</strong> Verwenden Sie den Access Token:"
  "auth_code_step4": "<strong>Schritt 4:</strong> Wenn der Access Token abläuft, verwenden Sie den Refresh Token, um einen neuen zu erhalten:"
  "auth_code_note": "Access Token läuft nach 1 Stunde ab. Refresh Tokens sind 1 Monat gültig."
  "client_cred_flow_title": "OAuth2 Client Credentials Flow"
  "client_cred_good_for": "Wenn Sie statistische Daten benötigen oder auf die öffentlichen Ergebnisse eines beliebigen Spielers ohne Benutzerinteraktion zugreifen möchten. Ideal für Bestenlisten-Widgets, Wettbewerbsergebnis-Anzeigen, Community-Statistik-Dashboards oder Datenanalyse-Tools."
  "client_cred_step1": "<strong>Schritt 1:</strong> Fordern Sie direkt einen Access Token an:"
  "client_cred_step2": "<strong>Schritt 2:</strong> Verwenden Sie den Access Token, um die Daten eines öffentlichen Spielers zu lesen:"
  "client_cred_note": "Nur Lesezugriff. <code>/me</code>-Endpoints nicht verfügbar. Versteckte/private Spieler liefern leere Ergebnisse."
  "scopes_title": "Verfügbare Scopes"
  "scope_default": "Standard"
  "scope_auth_code_only": "nur Auth Code"
  "endpoints_title": "Verfügbare Endpoints"
  "endpoints_subtitle": "Welche Endpoints Sie nutzen können, hängt von Ihrer Authentifizierungsmethode ab."
