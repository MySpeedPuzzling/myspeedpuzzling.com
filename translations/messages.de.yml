    methodology:
        title: "So berechnen wir"
        subtitle: "Vollständige Transparenz über unsere Puzzle-Einblicke-Algorithmen"
        show_formula: "Genaue Formel anzeigen"
        overview_difficulty_desc: "Wie schwer ist jedes Puzzle? Wir vergleichen deine Zeit mit deinem persönlichen Durchschnitt, um das herauszufinden."
        overview_skill_desc: "Wie gut bist du? Wir stufen dich gegen andere Löser bei jedem Puzzle ein, gewichtet nach Schwierigkeit und Aktualität."
        overview_elo_desc: "Portfolio-basierte kompetitive Bewertung. Deine besten Ergebnisse der letzten 24 Monate, schwierigkeitsgewichtet mit Zeitverfall."
        section_baseline_title: "Spieler-Baseline"
        section_baseline_desc: "Die Baseline jedes Spielers ist der <strong>gewichtete Median</strong> seiner Erstversuch-Solo-Zeiten für eine bestimmte Teilezahl. Neuere Lösungen zählen dank exponentieller Verfallsgewichtung mehr."
        section_baseline_formula: "Eine Lösung von vor 18 Monaten hat ~37% Gewicht. Eine Lösung von gestern hat ~100% Gewicht."
        section_baseline_minimum: "<strong>Minimum:</strong> 5 verschiedene gelöste Puzzles (Erstversuch, Solo) pro Teilezahl."
        baseline_decay_title: "Zeitverfall mit 3-Monats-Plateau"
        baseline_decay_desc: "Lösungen der letzten 3 Monate zählen mit vollem Gewicht. Danach verlieren ältere Lösungen allmählich an Einfluss, damit deine Baseline deine aktuelle Geschwindigkeit widerspiegelt."
        baseline_decay_formula_note: "Die Baseline ist ein <strong>gewichteter Median</strong> deiner Erstversuch-Solo-Zeiten bei jeder Teilezahl. Neuere Lösungen verschieben den Median stärker als ältere."
        baseline_exotic_title: "Exotische Teilezahlen"
        baseline_exotic_desc: "Bei Puzzles mit ungewöhnlichen Teilezahlen (z.B. 631 Teile) haben die meisten Spieler keine 5 Lösungen bei genau dieser Anzahl. Wir lösen dies, indem wir ihre Baseline aus nahegelegenen Teilezahlen schätzen, für die sie <em>Daten haben</em>, mittels Log-Raum-Interpolation. So erhalten mehr Puzzles Schwierigkeitsbewertungen."
        section_difficulty_title: "Puzzle-Schwierigkeit"
        section_difficulty_desc: "Für jeden qualifizierenden Spieler, der ein Puzzle gelöst hat, berechnen wir einen <strong>Schwierigkeitsindex</strong>:"
        section_difficulty_formula: "Index < 1,0 = einfacher als der Durchschnitt für diesen Spieler. Index > 1,0 = schwerer."
        section_difficulty_median: "Der Schwierigkeitsgrad des Puzzles ist der <strong>Median</strong> aller qualifizierenden Indizes. Indizes über 5,0 werden als Ausreißer ausgeschlossen."
        section_difficulty_minimum: "<strong>Minimum:</strong> 5 qualifizierte Spieler für einen Schwierigkeitsgrad erforderlich."
        section_difficulty_tiers_title: "Schwierigkeitsstufen"
        difficulty_example_time: "Du hast dieses Puzzle gelöst in:"
        difficulty_example_baseline: "Deine Baseline:"
        difficulty_example_index: "Schwierigkeitsindex:"
        difficulty_example_meaning: "15% schwerer als der Durchschnitt für dich"
        section_confidence_title: "Konfidenzstufen"
        section_skill_title: "Spieler-Skill"
        section_skill_desc: "Spieler-Skill misst, wie du <strong>im Vergleich zu anderen Lösern bei jedem Puzzle</strong> abschneidest, gewichtet nach Puzzle-Schwierigkeit. Schwerere Puzzles zählen mehr."
        section_skill_formula: "Wert > 1,0 = schneller als erwartet. Wert < 1,0 = langsamer als erwartet."
        section_skill_minimum: "<strong>Minimum:</strong> 10 qualifizierende Puzzles, jedes mit mindestens 20 Erstversuch-Lösern."
        section_skill_tiers_title: "Skill-Stufen"
        skill_decay_title: "Skill-Aktualitätsgewichtung"
        skill_decay_desc: "Deine Skill-Stufe spiegelt deine aktuelle Fähigkeit wider. Neuere Puzzles haben durch einen sanften Zeitverfall mit einem 6-Monats-Plateau mehr Einfluss als ältere."
        skill_example_title: "Beispiel: Wie dein Skill-Wert berechnet wird"
        skill_example_desc: "Du hast <strong>Puzzle X</strong> in 45 Min gelöst, <strong>vor 3 Monaten</strong>."
        skill_example_slower: "Von 50 Erstversuch-Lösern waren <strong>38 langsamer</strong> — dein Perzentil = <strong>0,78</strong>"
        skill_example_difficulty: "Puzzle X ist <strong>Anspruchsvoll</strong> (Schwierigkeit 1,18) — Schwierigkeitsgewicht = <strong>1,09</strong>"
        skill_example_weighted: "Gewichtetes Perzentil: 0,78 × 1,09 = <strong>0,85</strong>"
        skill_example_age: "Lösung ist 3 Monate alt (innerhalb des Plateaus) — Altersgewicht = <strong>1,00</strong>"
        skill_example_result: "Dein Skill-Wert = gewichteter Median all solcher Einträge, wobei neuere Lösungen mehr Einfluss haben."
        section_elo_title: "MSP Rating Rangliste"
        section_elo_desc: "Eine kompetitive <strong>portfolio-basierte</strong> Bewertung. Deine besten Puzzle-Ergebnisse der letzten 24 Monate werden ausgewertet, wobei Erstversuch-Leistung (75%) und Bestzeit-Leistung (25%) kombiniert werden. Schwerere Puzzles zählen mehr. Neuere Ergebnisse haben durch sanften Zeitverfall mehr Gewicht."
        section_elo_formula: "K = 60 für die ersten 10 Matches (Platzierung), K = 30 danach. Startwert: 1000."
        section_elo_minimum: "<strong>Minimum:</strong> 20 Erstversuche + 50 qualifizierende Puzzles innerhalb eines rollenden 24-Monats-Fensters. Jedes Puzzle muss 20+ Löser haben."
        section_elo_periods: "Zwei Zeiträume verfügbar: <strong>Monatlich</strong> (frischer Start jeden Monat) und <strong>Alle Zeit</strong> (dauerhaft)."
        elo_fa_title: "Erstversuche (75%)"
        elo_fa_desc: "Ein Puzzle kalt zu lösen hat das meiste Gewicht — es ist das reinste Maß für Können. Deine Top 100 Erstversuch-Ergebnisse werden ausgewertet."
        elo_bt_title: "Bestzeiten (25%)"
        elo_bt_desc: "Deine schnellste Zeit bei jedem Puzzle zählt auch — echte Verbesserung durch Übung wird belohnt, aber mit geringerem Gewicht als kaltes Lösen."
        elo_decay_title: "Rating-Aktualitätsgewichtung"
        elo_decay_desc: "Portfolio-Einträge werden sanft nach Alter abgebaut, damit neuere Ergebnisse mehr zählen, während ältere starke Ergebnisse weiterhin gelten. Ein 3-Monats-Plateau hält sehr aktuelle Ergebnisse auf vollem Wert."
        elo_decay_cutoff: "Harter Grenzwert bei 24 Monaten — Lösungen, die älter sind, werden vollständig ausgeschlossen."
        elo_antigaming_title: "Anti-Gaming-Eigenschaften"
        elo_antigaming_easy: "<strong>Einfache Puzzle farmen:</strong> Schwierigkeitsgewichtung macht schwere Puzzles bei gleichem Perzentil wertvoller."
        elo_antigaming_grinding: "<strong>Gleiches Puzzle wiederholen:</strong> Betrifft nur einen Bestzeit-Eintrag (25% Gewicht). Erstversuch-Wert ist fixiert."
        elo_antigaming_volume: "<strong>Mengen-Anhäufung:</strong> Obergrenze von 100. Nach 100 Puzzles helfen weitere Lösungen nur, wenn sie besser als dein schwächster Eintrag sind."
        elo_antigaming_inactivity: "<strong>Inaktivität:</strong> Zeitverfall reduziert ältere Ergebnisse allmählich. Bleibe aktiv, um deine Bewertung zu halten."
        elo_example_title: "Beispiel: Kaltlöser vs Dauerlöser"
        elo_example_desc: "Gleiches <strong>Schweres</strong> Puzzle (Schwierigkeit 1,35, Gewicht 1,175), gelöst <strong>letzten Monat</strong> (Verfall = 1,0):"
        elo_example_player_a: "<strong>Spieler A:</strong> Starker Erstversuch (92. Perzentil), löst nie wieder"
        elo_example_player_a_score: "Wert: 0,92 × 1,175 × 1,0 = <strong>1,08</strong>"
        elo_example_player_b: "<strong>Spieler B:</strong> Schwacher Erstversuch (60.), trainiert auf 95. Perzentil Bestzeit"
        elo_example_player_b_score: "Wert: 0,75 × 0,70 + 0,25 × 1,12 = <strong>0,81</strong>"
        elo_example_conclusion: "Spieler A gewinnt deutlich — rohes Kaltlöser-Talent führt, aber B bekommt Teilpunkte für Verbesserung."
        section_prediction_title: "Zeitvorhersage"
        section_prediction_formula: "Der Bereich zeigt, wo 50%% der Löser mit deiner Geschwindigkeit landen (P25-P75). Für Wiederholungslöser basierend auf deiner persönlichen Geschichte."
        prediction_intro: "Wir verwenden ein mehrschichtiges Vorhersagesystem. Wenn du das Puzzle schon einmal gelöst hast, bekommst du eine <strong>persönliche Vorhersage</strong> basierend auf deiner Verbesserungshistorie und datengestützten Verbesserungsverhältnissen. Andernfalls bekommst du eine <strong>statistische Vorhersage</strong> basierend auf deiner Baseline und der Puzzle-Schwierigkeit."
        prediction_ratios_title: "Verbesserungsverhältnisse"
        prediction_ratios_desc: "Wir berechnen <strong>Verbesserungsverhältnisse</strong> — wie viel schneller Spieler typischerweise zwischen aufeinanderfolgenden Versuchen werden (1.→2., 2.→3. usw.). Diese werden aus echten Daten aller Spieler und Puzzles berechnet, stratifiziert nach dem Zeitabstand zwischen Versuchen."
        prediction_ratios_formula: "ratio(N→N+1) = median(zeit_versuch_N+1 / zeit_versuch_N)\n\nQuellen (Prioritätsreihenfolge):\n  1. Dein persönliches Verhältnis (aus allen deinen Wiederholungen)\n  2. Globales Verhältnis (von allen Spielern, pro Teilezahl)\n  3. Standard: 0,90\n\nAbstandskorrektur: dein persönliches Verhältnis wird\ndurch globale Abstands-Bucket-Daten angepasst."
        prediction_ratios_gap_desc: "Der Zeitabstand zwischen Versuchen beeinflusst, wie viel du dich erinnerst. Verhältnisse sind nach Abstandsdauer gruppiert:"
        prediction_ratios_gap_header: "Bucket"
        prediction_ratios_gap_range: "Bereich"
        prediction_personal_title: "Persönliche Vorhersage (1+ vorherige Lösungen)"
        prediction_personal_desc: "Wenn du das Puzzle schon gelöst hast, sagen wir deine nächste Zeit mithilfe von <strong>Verbesserungsverhältnissen</strong> kombiniert mit <strong>Holts gedämpfter Trendglättung</strong> vorher. Bei weniger Daten dominiert das Verbesserungsverhältnis. Mit mehr Historie übernimmt das Trendmodell."
        prediction_personal_formula: "ratio_prediction = letzte_zeit × verbesserungsverhältnis(N→N+1, abstand)\n\nKombination mit Holts gedämpftem Trend (α=0,5, β=0,4, φ=0,8):\n  N = 1:   100%% Verhältnisvorhersage\n  N = 2-5: Kombination (Holt-Gewicht = (N-1)/5)\n  N ≥ 6:   100%% Holts gedämpfter Trend\n\nMinimum: max(Vorhersage, Bestzeit × 0,70)"
        prediction_personal_dampening: "Die Kombination sorgt für fließende Übergänge: mit wenig Daten leiten puzzle-übergreifende Verbesserungsmuster die Vorhersage. Wenn die puzzlespezifische Historie wächst, übernimmt das Trendmodell."
        prediction_statistical_title: "Statistische Vorhersage (erstes Mal bei diesem Puzzle)"
        prediction_statistical_desc: "Wenn du dieses Puzzle noch nicht gelöst hast, kombinieren wir deine Baseline mit der Puzzle-Schwierigkeit:"
        prediction_statistical_example_baseline: "Deine 500-Teile-Baseline:"
        prediction_statistical_example_difficulty: "Puzzle-Schwierigkeit:"
        prediction_statistical_example_predicted: "Vorhergesagte Zeit:"
        prediction_statistical_range: "Der Bereich verwendet P25–P75 der Schwierigkeitsindizes des Puzzles: Baseline × P25 bis Baseline × P75. Sicherheitsgrenzen halten den Bereich zwischen 30%% und 300%% der vorhergesagten Zeit."
        section_data_quality_title: "Datenqualität"
        section_data_quality_solo: "<strong>Nur Solo:</strong> Duo- und Team-Lösungen sind ausgeschlossen"
        section_data_quality_first: "<strong>Erstversuche:</strong> Nur erste Begegnungen mit jedem Puzzle zählen für Schwierigkeit und Baselines"
        section_data_quality_suspicious: "<strong>Verdächtige ausgeschlossen:</strong> Als verdächtig markierte Zeiten werden ausgeschlossen"
        section_data_quality_outlier: "<strong>Ausreißerfilter:</strong> Schwierigkeitsindizes über 5,0 werden ausgeschlossen (wahrscheinlich Timer-Fehler)"
        section_data_quality_recency: "<strong>Aktualitätsgewichtung:</strong> Neuere Lösungen zählen mehr — Baselines, Skill-Stufen und Rating verwenden alle Zeitverfall, um deine aktuelle Fähigkeit widerzuspiegeln"
        section_opt_out_title: "Abmeldung"
        section_opt_out_desc: "Spieler können sich in ihren <a href=\"%url%\">Profileinstellungen</a> vom Ranking und Skill-Tracking abmelden. Abgemeldete Spieler sind weiterhin in allen Hintergrundberechnungen enthalten — ihre Ergebnisse tragen zu Puzzle-Schwierigkeitsgraden und Rankings anderer Spieler bei. Sie erscheinen einfach nicht auf der öffentlichen MSP Rating Rangliste und sehen ihre eigene Skill-Stufe oder Rating-Bewertung nicht. Eine erneute Anmeldung stellt die volle Sichtbarkeit sofort wieder her."
        section_personality_title: "Puzzle-Persönlichkeitsmetriken"
        personality_box_dependence_detail: "Verhältnis der Schwierigkeit ohne Schachtel zur Schwierigkeit mit Schachtel. 1,0 = kein Unterschied, 2,0 = doppelt so schwer ohne Schachtel. Min: 10 Löser ohne Schachtel + 5 mit Schachtel."
        personality_improvement_ceiling_detail: "Verhältnis der mittleren Erstversuch-Zeit zum 10. Perzentil aller Versuche. Höher bedeutet, dass Übung die Zeiten dramatisch verbessert. Min: 20 Löser."
        personality_memorability_detail: "Misst, wie schnell Spieler dieses Puzzle über ihre ersten 3 Versuche lernen, normalisiert gegen die durchschnittliche Puzzle-Lernrate. Ein Wert > 1,0 bedeutet, dass dieses Puzzle Vertrautheit stärker belohnt als der Durchschnitt. Min: 8 Spieler mit 3+ Versuchen."
        personality_predictability_detail: "Wert von 0 bis 1 (begrenzt). Näher an 1 = konsistentere Schwierigkeitserfahrung über verschiedene Löser. Min: 20 qualifizierende Indizes."
        personality_skill_sensitivity_detail: "Verhältnis des 75. zum 25. Perzentil der Schwierigkeitsindizes. Höher = größerer Unterschied zwischen schnellen und langsamen Lösern. Min: 20 qualifizierende Indizes."
        section_recalculation_note: "Alle Einblick-Metriken werden alle 15 Minuten neu berechnet."
        section_recalculation_countdown: "Nächste Neuberechnung in"
        thresholds_title: "Mindest-Datenschwellen"
        threshold_baseline: "5 verschiedene Erstversuch-Solo-Lösungen pro Teilezahl"
