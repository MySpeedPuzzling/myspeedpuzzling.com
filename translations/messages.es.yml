        baseline_exotic_desc: "Para puzzles con cantidades de piezas inusuales (ej. 631 piezas), la mayoría de los jugadores no tendrán 5 resoluciones en esa cantidad exacta. Resolvemos esto estimando su línea base a partir de cantidades de piezas cercanas para las que <em>sí</em> tienen datos, usando interpolación en espacio logarítmico. Esto significa que más puzzles obtienen calificaciones de dificultad."
        section_difficulty_title: "Dificultad del Puzzle"
        section_difficulty_desc: "Para cada jugador calificado que resolvió un puzzle, calculamos un <strong>índice de dificultad</strong>:"
