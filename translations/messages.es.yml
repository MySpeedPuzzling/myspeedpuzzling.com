fair_use_policy:
    meta:
        title: "Política de Uso Justo de la API"
        description: "Reglas de uso de la API y política de uso justo para la plataforma MySpeedPuzzling."
    heading: "Política de Uso Justo de la API"
    last_updated: "Última actualización: 2 de abril de 2026"
    already_accepted: "Ya has aceptado la Política de Uso de la API."
    accept_button: "Acepto la Política de Uso de la API"
    intro_title: "Bienvenido, Desarrollador"
    intro_p1: "Estamos encantados de abrir nuestros datos a la comunidad puzzlera. La API de MySpeedPuzzling existe para que los desarrolladores creen integraciones, herramientas y experiencias creativas — no para permitir la explotación de nuestra plataforma ni de sus usuarios."
    intro_p2: "Al usar la API, aceptas los términos descritos en esta página. Están escritos en lenguaje sencillo porque queremos que los leas de verdad."
    rate_limits_title: "Límites de Velocidad y Acceso"
    rate_limits_p1: "Comenzamos con límites de velocidad generosos — queremos que sea fácil construir con nuestra API. Sin embargo, todo el tráfico es monitoreado activamente por clave de API y por dirección IP."
    rate_limits_p2: "Si se detecta un uso excesivo, se introducirán límites de velocidad ajustados a un número razonable. El abuso persistente o superar los límites establecidos resultará en el bloqueo automático de IP que requiere desbloqueo manual por nuestro equipo."
    rate_limits_p3: "Los intentos de eludir los límites de velocidad distribuyendo solicitudes entre múltiples IPs, usando proxies, VPNs, infraestructura rotativa o múltiples claves de API serán detectados y tratados como una violación grave de la política."
    rate_limits_p4: "Si necesitas límites más altos para un proyecto legítimo, contáctanos — no intentes saltarte el sistema."
    rate_limits_p5: "Respeta los encabezados <code>Retry-After</code> e implementa un retroceso adecuado en tu cliente."
    permitted_title: "Uso Permitido"
    permitted_personal: "El acceso a la API es <strong>únicamente para uso personal y no comercial</strong>."
    permitted_no_sell: "Está estrictamente prohibido vender, revender, licenciar o proporcionar datos de la API a terceros sin nuestra aprobación escrita explícita."
    permitted_no_bulk: "No se permite la enumeración ni la descarga masiva de toda la base de datos ni de partes significativas de ella."
    permitted_no_scrape: "No se permite hacer scraping del sitio web como alternativa a las limitaciones de la API."
    permitted_no_compete: "No se permite usar la API para construir una plataforma competidora ni replicar la funcionalidad principal de MySpeedPuzzling (clasificaciones, rankings, perfiles de usuario como servicio) — salvo que se solicite y autorice expresamente."
    permitted_no_interfere: "Las aplicaciones no deben interferir con la funcionalidad de la plataforma ni degradar la experiencia de otros usuarios."
    data_title: "Propiedad y Gestión de Datos"
    data_ownership: "Todos los datos son propiedad de MySpeedPuzzling y sus usuarios. El acceso a la API otorga una licencia para usar los datos, no su propiedad."
    data_personal: "Los datos personales de los usuarios (perfiles, tiempos de resolución) no deben usarse para identificar, perfilar o contactar a personas fuera de la plataforma sin su consentimiento."
    data_cache: "Los datos en caché no deben almacenarse por más de 24 horas — nosotros somos la fuente de verdad."
    data_misrepresent: "Los datos no deben modificarse, tergiversarse ni presentarse en un contexto engañoso."
    keys_title: "Claves de API y Normas de Cuenta"
    keys_personal: "Las claves de API son personales e intransferibles. No se pueden compartir."
    keys_responsible: "Los desarrolladores son responsables de mantener su clave segura y de todo el uso bajo su clave."
    keys_no_automated: "No se permite la creación automatizada de cuentas para obtener múltiples claves de API."
    monitoring_title: "Monitoreo y Aplicación"
    monitoring_active: "El uso de la API es monitoreado activamente — incluyendo tipos de solicitud, volúmenes, direcciones IP y patrones de acceso."
    monitoring_retention: "Los datos de monitoreo (registros de solicitudes, direcciones IP, patrones de uso) pueden conservarse indefinidamente por motivos de seguridad y prevención de abusos."
    monitoring_revoke: "Nos reservamos el derecho de revocar el acceso a la API en cualquier momento sin previo aviso si se viola esta política."
    monitoring_circumvent: "Eludir cualquier restricción se considera una ruptura de confianza que lleva a la revocación permanente."
    attribution_title: "Atribución"
    attribution_mention: "Cuando presentes datos de MySpeedPuzzling en tu aplicación, por favor menciona su origen. Un simple \"Datos de MySpeedPuzzling\" con un enlace es suficiente."
    attribution_logo: "Siéntete libre de usar nuestro logotipo en tu proyecto:"
    attribution_download: "Descargar Logotipo (SVG)"
    attribution_link: "Enlaza a myspeedpuzzling.com cuando sea apropiado."
    tell_us_title: "Cuéntanos Qué Estás Construyendo"
    tell_us_p1: "Nos encantaría saber genuinamente en qué estás trabajando. Conocer proyectos de la comunidad nos inspira y nos ayuda a mejorar la API para todos."
    tell_us_p2: "Se solicita una breve descripción del caso de uso al obtener una clave de API. Podemos destacar proyectos comunitarios interesantes en nuestro sitio web (con tu permiso, por supuesto)."
    tell_us_p3: "¿Tienes preguntas, ideas o comentarios? Escríbenos a jan@myspeedpuzzling.com."
    updates_title: "Actualizaciones de la Política"
    updates_notice: "Nos reservamos el derecho de actualizar esta política con un aviso razonable (30 días). El uso continuado tras los cambios constituye su aceptación."
    updates_email: "Los cambios importantes se comunicarán a los desarrolladores registrados por correo electrónico."
    contact_title: "Contacto"
    contact_info: "Para límites de velocidad más altos, consultas de colaboración, discusiones sobre casos de uso o preguntas sobre la política:"
    closing: "Queremos que tengas éxito. Juega limpio y te apoyaremos."
