        section_confidence_title: "Niveles de Confianza"
        section_skill_title: "Habilidad del Jugador"
        section_skill_desc: "La habilidad del jugador mide cómo rindes <strong>comparado con otros resolutores en cada puzzle</strong>, ponderado por la dificultad del puzzle. Los puzzles más difíciles valen más."
        section_skill_formula: "Puntuación > 1.0 = más rápido de lo esperado. Puntuación < 1.0 = más lento de lo esperado."
        section_skill_minimum: "<strong>Mínimo:</strong> 10 puzzles calificados, cada uno con al menos 20 resolutores de primer intento."
        section_skill_tiers_title: "Niveles de Habilidad"
        skill_decay_title: "Ponderación por recencia de habilidad"
        skill_decay_desc: "Tu nivel de habilidad refleja tu capacidad actual. Los puzzles recientes tienen más influencia que los antiguos mediante un suave decaimiento temporal con una meseta de 6 meses."
        skill_example_title: "Ejemplo: Cómo se calcula tu puntuación de habilidad"
        skill_example_desc: "Resolviste <strong>Puzzle X</strong> en 45 min, <strong>hace 3 meses</strong>."
        skill_example_slower: "De 50 resolutores de primer intento, <strong>38 fueron más lentos</strong> — tu percentil = <strong>0.78</strong>"
        skill_example_difficulty: "El Puzzle X es <strong>Desafiante</strong> (dificultad 1.18) — peso de dificultad = <strong>1.09</strong>"
        skill_example_weighted: "Percentil ponderado: 0.78 × 1.09 = <strong>0.85</strong>"
        skill_example_age: "La resolución tiene 3 meses (dentro de la meseta) — peso por antigüedad = <strong>1.00</strong>"
        skill_example_result: "Tu puntuación de habilidad = mediana ponderada de todas estas entradas, donde las resoluciones recientes tienen más influencia."
        section_elo_title: "Escalera MSP Rating"
        section_elo_desc: "Una puntuación competitiva <strong>basada en portafolio</strong>. Tus mejores resultados de puzzles de los últimos 24 meses se evalúan, combinando rendimiento de primer intento (75%) con rendimiento de mejor tiempo (25%). Los puzzles más difíciles valen más. Los resultados recientes tienen más peso mediante un suave decaimiento temporal."
        section_elo_formula: "K = 60 para los primeros 10 partidos (colocación), K = 30 después. Puntuación inicial: 1000."
        section_elo_minimum: "<strong>Mínimo:</strong> 20 primeros intentos + 50 puzzles calificados dentro de una ventana móvil de 24 meses. Cada puzzle debe tener 20+ resolutores."
        section_elo_periods: "Dos períodos disponibles: <strong>Mensual</strong> (reinicio fresco cada mes) y <strong>Todo el tiempo</strong> (persistente)."
        elo_fa_title: "Primeros intentos (75%)"
        elo_fa_desc: "Resolver un puzzle en frío tiene el mayor peso — es la medida más pura de habilidad. Se evalúan tus 100 mejores resultados de primer intento."
        elo_bt_title: "Mejores tiempos (25%)"
        elo_bt_desc: "Tu tiempo más rápido en cada puzzle también cuenta — la mejora genuina a través de la práctica se recompensa, pero con menor peso que la resolución en frío."
        elo_decay_title: "Ponderación por recencia del Rating"
        elo_decay_desc: "Las entradas del portafolio se reducen suavemente por antigüedad para que los resultados recientes importen más, mientras que los resultados fuertes antiguos aún cuentan. Una meseta de 3 meses mantiene los resultados muy recientes a valor completo."
        elo_decay_cutoff: "Corte estricto a 24 meses — las resoluciones más antiguas se excluyen por completo."
        elo_antigaming_title: "Propiedades anti-manipulación"
        elo_antigaming_easy: "<strong>Farming de puzzles fáciles:</strong> La ponderación por dificultad hace que los puzzles difíciles valgan más al mismo percentil."
        elo_antigaming_grinding: "<strong>Repetir el mismo puzzle:</strong> Solo afecta una entrada de mejor tiempo (25% de peso). La puntuación de primer intento está fijada."
        elo_antigaming_volume: "<strong>Acumulación por volumen:</strong> Límite de 100. Después de 100 puzzles, más resoluciones solo ayudan si son mejores que tu entrada más débil."
        elo_antigaming_inactivity: "<strong>Inactividad:</strong> El decaimiento temporal reduce gradualmente los resultados antiguos. Mantente activo para conservar tu puntuación."
        elo_example_title: "Ejemplo: Resolutor en Frío vs Repetidor"
        elo_example_desc: "Mismo puzzle <strong>Difícil</strong> (dificultad 1.35, peso 1.175), resuelto <strong>el mes pasado</strong> (decaimiento = 1.0):"
        elo_example_player_a: "<strong>Jugador A:</strong> Fuerte primer intento (percentil 92), nunca repite"
        elo_example_player_a_score: "Puntuación: 0.92 × 1.175 × 1.0 = <strong>1.08</strong>"
        elo_example_player_b: "<strong>Jugador B:</strong> Primer intento débil (percentil 60), repite hasta percentil 95 de mejor tiempo"
        elo_example_player_b_score: "Puntuación: 0.75 × 0.70 + 0.25 × 1.12 = <strong>0.81</strong>"
        elo_example_conclusion: "El Jugador A gana decisivamente — el talento puro de resolución en frío lidera, pero B obtiene crédito parcial por la mejora."
        section_prediction_title: "Predicción de Tiempo"
        section_prediction_formula: "El rango muestra dónde cae el 50%% de los resolutores con tu velocidad (P25-P75). Para resolutores repetidos, basado en tu historial personal."
        prediction_intro: "Usamos un sistema de predicción por capas. Si ya resolviste el puzzle antes, obtienes una <strong>predicción personal</strong> usando tu historial de mejora y ratios de mejora basados en datos. De lo contrario, obtienes una <strong>predicción estadística</strong> basada en tu línea base y la dificultad del puzzle."
        prediction_ratios_title: "Ratios de mejora"
        prediction_ratios_desc: "Calculamos <strong>ratios de mejora</strong> — cuánto más rápidos son los jugadores típicamente entre intentos consecutivos (1.°→2.°, 2.°→3.°, etc.). Se calculan a partir de datos reales de todos los jugadores y puzzles, estratificados por el intervalo de tiempo entre intentos."
        prediction_ratios_formula: "ratio(N→N+1) = mediana(tiempo_intento_N+1 / tiempo_intento_N)\n\nFuentes (orden de prioridad):\n  1. Tu ratio personal (de todas tus resoluciones repetidas)\n  2. Ratio global (de todos los jugadores, por cantidad de piezas)\n  3. Predeterminado: 0,90\n\nCorrección de intervalo: tu ratio personal se ajusta\ncon datos globales de intervalos de tiempo."
        prediction_ratios_gap_desc: "El intervalo de tiempo entre intentos afecta cuánto recuerdas. Los ratios se agrupan por duración del intervalo:"
        prediction_ratios_gap_header: "Grupo"
        prediction_ratios_gap_range: "Rango"
        prediction_personal_title: "Predicción personal (1+ resoluciones previas)"
        prediction_personal_desc: "Cuando ya resolviste el puzzle, predecimos tu próximo tiempo usando <strong>ratios de mejora</strong> combinados con <strong>suavizado de tendencia amortiguada de Holt</strong>. Con menos datos previos, domina el ratio de mejora. Con más historial, el modelo de tendencia toma el control."
        prediction_personal_formula: "ratio_prediction = último_tiempo × ratio_mejora(N→N+1, intervalo)\n\nCombinación con tendencia amortiguada de Holt (α=0,5, β=0,4, φ=0,8):\n  N = 1:   100%% predicción por ratio\n  N = 2-5: combinación (peso Holt = (N-1)/5)\n  N ≥ 6:   100%% tendencia amortiguada de Holt\n\nMínimo: max(predicción, mejor_tiempo × 0,70)"
        prediction_personal_dampening: "La combinación asegura transiciones suaves: con pocos datos, los patrones de mejora entre puzzles guían la predicción. A medida que crece el historial específico del puzzle, el modelo de tendencia toma el control."
        prediction_statistical_title: "Predicción estadística (puzzle por primera vez)"
        prediction_statistical_desc: "Cuando no has resuelto este puzzle antes, combinamos tu línea base con la dificultad del puzzle:"
        prediction_statistical_example_baseline: "Tu línea base de 500 piezas:"
        prediction_statistical_example_difficulty: "Dificultad del puzzle:"
        prediction_statistical_example_predicted: "Tiempo predicho:"
        prediction_statistical_range: "El rango usa P25–P75 de los índices de dificultad del puzzle: línea base × P25 a línea base × P75. Los límites de seguridad mantienen el rango entre 30%% y 300%% del tiempo predicho."
        section_data_quality_title: "Calidad de Datos"
        section_data_quality_solo: "<strong>Solo en solitario:</strong> Las resoluciones en dúo y equipo se excluyen"
        section_data_quality_first: "<strong>Primeros intentos:</strong> Solo los primeros encuentros con cada puzzle cuentan para dificultad y líneas base"
        section_data_quality_suspicious: "<strong>Exclusión de sospechosos:</strong> Los tiempos marcados como sospechosos se excluyen"
        section_data_quality_outlier: "<strong>Filtro de valores atípicos:</strong> Los índices de dificultad superiores a 5.0 se excluyen (probablemente errores de temporizador)"
        section_data_quality_recency: "<strong>Ponderación por recencia:</strong> Las resoluciones recientes cuentan más — las líneas base, niveles de habilidad y Rating usan decaimiento temporal para reflejar tu capacidad actual"
        section_opt_out_title: "Darse de Baja"
        section_opt_out_desc: "Los jugadores pueden darse de baja del ranking y seguimiento de habilidad en los <a href=\"%url%\">ajustes de su perfil</a>. Los jugadores dados de baja siguen incluidos en todos los cálculos de fondo — sus resultados contribuyen a las puntuaciones de dificultad de puzzles y las clasificaciones de otros jugadores. Simplemente no aparecen en la escalera pública MSP Rating y no ven su propio nivel de habilidad o puntuación Rating. Darse de alta de nuevo restaura la visibilidad completa inmediatamente."
        section_personality_title: "Métricas de Personalidad del Puzzle"
        personality_box_dependence_detail: "Ratio de dificultad sin caja vs con caja. 1.0 = sin diferencia, 2.0 = el doble de difícil sin caja. Mín: 10 resolutores sin caja + 5 con caja."
        personality_improvement_ceiling_detail: "Ratio del tiempo mediano de primer intento al percentil 10 de todos los intentos. Mayor significa que la práctica mejora dramáticamente los tiempos. Mín: 20 resolutores."
        personality_memorability_detail: "Mide qué tan rápido los jugadores aprenden este puzzle en sus primeros 3 intentos, normalizado contra la tasa promedio de aprendizaje de puzzles. Un valor > 1.0 significa que este puzzle recompensa la familiaridad más que el promedio. Mín: 8 jugadores con 3+ intentos."
        personality_predictability_detail: "Puntuación de 0 a 1 (acotada). Más cerca de 1 = experiencia de dificultad más consistente entre diferentes resolutores. Mín: 20 índices calificados."
        personality_skill_sensitivity_detail: "Ratio del percentil 75 al percentil 25 de los índices de dificultad. Mayor = mayor diferencia entre resolutores rápidos y lentos. Mín: 20 índices calificados."
        section_recalculation_note: "Todas las métricas de información se recalculan cada 15 minutos."
        section_recalculation_countdown: "Próximo recálculo en"
        thresholds_title: "Umbrales mínimos de datos"
        threshold_baseline: "5 resoluciones distintas de primer intento en solitario por cantidad de piezas"
        threshold_difficulty: "5 índices calificados de diferentes jugadores"
