  "what_is_good_for": "¿Para qué sirve?"
  "pat_good_for": "Cuando quieres acceder solo a tus propios datos. Perfecto para automatizaciones personales — importa tus resultados en Home Assistant, muestra tus estadísticas en un dashboard personal, registra tu progreso en una hoja de cálculo o crea un script de notificaciones personalizado."
  "pat_how_to": "Genera un token desde tu <strong>Configuración de perfil</strong> y úsalo en la cabecera <code>Authorization</code>:"
  "pat_note": "PAT te da acceso completo a todos los endpoints <code>/api/v1/me/*</code>. No se necesitan scopes. No se puede acceder a datos de otros jugadores."
  "auth_code_flow_title": "OAuth2 Authorization Code Flow"
  "auth_code_good_for": "Cuando estás creando una app donde los usuarios inician sesión con su cuenta de MySpeedPuzzling. Tu app puede acceder a sus datos en su nombre — mostrar sus resultados en tu sitio web, permitirles añadir tiempos de resolución a través de tu herramienta de competición o gestionar sus colecciones desde una interfaz personalizada."
  "auth_code_step1": "<strong>Paso 1:</strong> Redirige al usuario para que autorice tu app:"
  "auth_code_step2": "<strong>Paso 2:</strong> Intercambia el código de autorización por tokens:"
  "auth_code_step3": "<strong>Paso 3:</strong> Usa el access token:"
  "auth_code_step4": "<strong>Paso 4:</strong> Cuando el access token expire, usa el refresh token para obtener uno nuevo:"
  "auth_code_note": "El access token expira en 1 hora. Los refresh tokens son válidos durante 1 mes."
  "client_cred_flow_title": "OAuth2 Client Credentials Flow"
  "client_cred_good_for": "Cuando necesitas datos estadísticos o quieres acceder a los resultados públicos de cualquier jugador sin interacción del usuario. Ideal para construir widgets de clasificación, pantallas de resultados de competiciones, dashboards de estadísticas comunitarias o herramientas de análisis de datos."
  "client_cred_step1": "<strong>Paso 1:</strong> Solicita un access token directamente:"
  "client_cred_step2": "<strong>Paso 2:</strong> Usa el access token para leer datos de cualquier jugador público:"
