        section_difficulty_median: "La puntuación de dificultad del puzzle es la <strong>mediana</strong> de todos los índices calificados. Los índices superiores a 5.0 se excluyen como valores atípicos."
        section_difficulty_minimum: "<strong>Mínimo:</strong> 5 jugadores calificados necesarios para una puntuación de dificultad."
