        prediction_intro: "階層型予測システムを使用しています。パズルを以前に解いたことがある場合、改善履歴とデータ駆動型改善率を活用した<strong>個人予測</strong>が得られます。そうでない場合、ベースラインとパズルの難易度に基づく<strong>統計予測</strong>が得られます。"
        prediction_ratios_title: "改善率"
        prediction_ratios_desc: "<strong>改善率</strong>を計算します — 連続する挑戦間でプレイヤーが通常どれだけ速くなるか（1回目→2回目、2回目→3回目など）。これらは全プレイヤーとパズルの実データから計算され、挑戦間の時間間隔で層別化されています。"
        prediction_ratios_formula: "ratio(N→N+1) = median(タイム_挑戦_N+1 / タイム_挑戦_N)\n\nソース（優先順位）：\n  1. あなたの個人率（すべての再挑戦から）\n  2. グローバル率（全プレイヤーから、ピース数別）\n  3. デフォルト：0.90\n\n間隔補正：あなたの個人率はグローバルな\n時間間隔データで調整されます。"
        prediction_ratios_gap_desc: "挑戦間の時間間隔は記憶にどれだけ残るかに影響します。率は間隔の長さでグループ化されます："
        prediction_ratios_gap_header: "バケット"
        prediction_ratios_gap_range: "範囲"
        prediction_personal_title: "個人予測（1回以上の完成歴）"
        prediction_personal_desc: "パズルを以前に解いたことがある場合、<strong>改善率</strong>と<strong>ホルトの減衰トレンド平滑法</strong>を組み合わせて次のタイムを予測します。データが少ない場合は改善率が主導します。履歴が増えるとトレンドモデルが引き継ぎます。"
        prediction_personal_formula: "ratio_prediction = 最終タイム × 改善率(N→N+1, 間隔)\n\nホルトの減衰トレンドとの組み合わせ（α=0.5, β=0.4, φ=0.8）：\n  N = 1：  100%% 改善率予測\n  N = 2-5：ブレンド（ホルト重み = (N-1)/5）\n  N ≥ 6：  100%% ホルトの減衰トレンド\n\n下限：max(予測, ベストタイム × 0.70)"
        prediction_personal_dampening: "ブレンドにより滑らかな移行が保証されます：データが少ない場合、パズル間の改善パターンが予測を導きます。パズル固有の履歴が増えると、トレンドモデルが引き継ぎます。"
