        elo_antigaming_easy: "<strong>簡単なパズルの大量完成：</strong>難易度重み付けにより、同じパーセンタイルでも難しいパズルの方が高い価値を持ちます。"
        elo_antigaming_grinding: "<strong>同じパズルの繰り返し：</strong>1つのベストタイムエントリー（25%の重み）にのみ影響。初回挑戦スコアは固定。"
