        section_opt_out_title: "オプトアウト"
        section_opt_out_desc: "プレイヤーは<a href=\"%url%\">プロフィール設定</a>でランキングとスキル追跡をオプトアウトできます。オプトアウトしたプレイヤーはすべてのバックグラウンド計算に含まれ、パズル難易度スコアや他のプレイヤーのランキングに貢献します。公開MSP Ratingラダーに表示されず、自分のスキルティアやRatingレーティングも表示されないだけです。オプトインに戻すと、すぐに完全な表示が復元されます。"
