        elo_decay_desc: "ポートフォリオエントリーは時間により緩やかに減衰し、最近の結果がより重要になりますが、過去の好成績もカウントされます。3ヶ月のプラトーにより、直近の結果はフルバリューを維持します。"
        elo_decay_cutoff: "24ヶ月でハードカットオフ — それより古い完成は完全に除外されます。"
