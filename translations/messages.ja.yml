  "text": "<p>ランキングと競争に関する大型アップデートをお届けします：</p>\n<ul class=\"ms-0\" style=\"list-style-type: disc;\"><li class=\"mt-2\"><strong>パズル難易度</strong> — 実際の解答データに基づく難易度評価</li><li class=\"mt-2\"><strong>統計と予測</strong> — パーソナライズされたタイム予測を含む詳細な指標</li><li class=\"mt-2\"><strong>パズラーティア</strong> — ビギナーからレジェンドまで、あなたの実力を確認</li><li class=\"mt-2\"><strong>MSP Ratingランキング</strong> — チェスのRatingに着想を得た競技ランキング。現在、<strong>Wiktorが初代MSP King</strong>です。おめでとうございます！</li></ul>\n<p>計算式、ティア、Rating計算は、データが増えるにつれて<strong>調整される可能性があります</strong>。ランキングに参加したくない場合は、プロフィール設定から<strong>いつでもオプトアウト</strong>できます。</p>\n"
