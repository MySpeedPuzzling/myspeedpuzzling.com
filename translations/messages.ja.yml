"fair_use_policy":
    "meta":
        "title": "APIフェアユースポリシー"
        "description": "MySpeedPuzzlingプラットフォームのAPI利用規則とフェアユースポリシー。"
    "heading": "APIフェアユースポリシー"
    "last_updated": "最終更新：2026年4月2日"
    "already_accepted": "API利用ポリシーはすでに承諾済みです。"
    "accept_button": "API利用ポリシーに同意する"
    "intro_title": "ようこそ、デベロッパーの皆さん"
    "intro_p1": "私たちはパズルコミュニティにデータを公開できることを嬉しく思います。MySpeedPuzzling APIは、デベロッパーが創造的な統合、ツール、体験を構築できるようにするためのものです。プラットフォームやユーザーを搾取するためのものではありません。"
    "intro_p2": "APIを使用することで、このページに記載された条件に同意したことになります。実際に読んでいただけるよう、平易な言葉で書かれています。"
    "rate_limits_title": "レート制限とアクセス"
    "rate_limits_p1": "私たちは寛大なレート制限から始めています — APIを使った開発を容易にしたいと考えています。ただし、すべてのトラフィックはAPIキーおよびIPアドレスごとに積極的に監視されています。"
    "rate_limits_p2": "過度な使用が確認された場合、レート制限が導入され、適切な数に設定されます。継続的な悪用や設定されたレート制限の超過は、チームによる手動解除が必要な自動IPブラックリスト登録につながります。"
    "rate_limits_p3": "複数のIPへのリクエスト分散、プロキシ、VPN、ローテーションインフラ、または複数のAPIキーを使用してレート制限を回避しようとする試みは検出され、重大なポリシー違反として扱われます。"
    "rate_limits_p4": "正当なプロジェクトでより高い制限が必要な場合は、お問い合わせください — システムを回避しようとしないでください。"
    "rate_limits_p5": "<code>Retry-After</code>ヘッダーを尊重し、クライアントに適切なバックオフを実装してください。"
    "permitted_title": "許可された使用"
    "permitted_personal": "APIアクセスは<strong>個人的および非商業的な使用のみ</strong>を対象としています。"
    "permitted_no_sell": "当社の明示的な書面による承認なしに、APIデータを第三者に販売、再販売、ライセンス供与、または提供することは固く禁じられています。"
    "permitted_no_bulk": "データベース全体または大部分の列挙や一括ダウンロードは禁止します。"
    "permitted_no_scrape": "API制限の回避策としてウェブサイトをスクレイピングすることは禁止します。"
    "permitted_no_compete": "APIを使用して、競合プラットフォームを構築したり、MySpeedPuzzlingの主要機能（リーダーボード、ランキング、サービスとしてのユーザープロフィール）を複製することは禁止します。ただし、明示的に要請・承認された場合を除きます。"
    "permitted_no_interfere": "アプリケーションはプラットフォームの機能を妨げたり、他のユーザーのエクスペリエンスを低下させてはなりません。"
    "data_title": "データの所有権と取り扱い"
    "data_ownership": "すべてのデータはMySpeedPuzzlingおよびそのユーザーの所有物です。APIアクセスはデータの使用ライセンスを付与するものであり、所有権を付与するものではありません。"
    "data_personal": "ユーザーの個人データ（プロフィール、解答時間）は、本人の同意なしにプラットフォーム外で個人を特定、プロファイリング、または連絡するために使用してはなりません。"
    "data_cache": "キャッシュされたデータは24時間以上保存しないでください — 私たちが信頼できる唯一の情報源です。"
    "data_misrepresent": "データを改ざん、虚偽表示、または誤解を招くような文脈で提示してはなりません。"
    "keys_title": "APIキーとアカウントのルール"
    "keys_personal": "APIキーは個人的なもので譲渡不可です。共有は禁止です。"
    "keys_responsible": "デベロッパーはキーを安全に保管し、そのキーのすべての使用に責任を持ちます。"
    "keys_no_automated": "複数のAPIキーを取得するための自動アカウント作成は禁止します。"
    "monitoring_title": "監視と執行"
    "monitoring_active": "APIの使用は積極的に監視されています — リクエストの種類、量、IPアドレス、アクセスパターンを含みます。"
    "monitoring_retention": "監視データ（リクエストログ、IPアドレス、使用パターン）は、セキュリティおよび不正使用防止のために無期限に保持される場合があります。"
    "monitoring_revoke": "このポリシーに違反した場合、予告なくいつでもAPIアクセスを取り消す権利を留保します。"
    "monitoring_circumvent": "制限の回避は信頼の侵害として扱われ、永久に利用停止となります。"
    "attribution_title": "帰属表示"
    "attribution_mention": "アプリケーションでMySpeedPuzzlingのデータを提示する際は、データの出所を明記してください。リンク付きの「MySpeedPuzzlingのデータ」という簡単な表記で十分です。"
    "attribution_logo": "プロジェクトでは当社のロゴをご自由にお使いください："
    "attribution_download": "ロゴをダウンロード（SVG）"
    "attribution_link": "適切な場所でmyspeedpuzzling.comへリンクしてください。"
    "tell_us_title": "開発中のものを教えてください"
    "tell_us_p1": "あなたが何に取り組んでいるかを本当に知りたいと思っています。コミュニティプロジェクトについて聞くことは私たちに刺激を与え、皆のためにAPIを改善するのに役立ちます。"
    "tell_us_p2": "APIキーの取得時に、簡単なユースケースの説明をお願いしています。クールなコミュニティプロジェクトは当社ウェブサイトで紹介する場合があります（もちろん、あなたの許可を得た上で）。"
    "tell_us_p3": "質問、アイデア、フィードバックがあれば、jan@myspeedpuzzling.comまでご連絡ください。"
    "updates_title": "ポリシーの更新"
    "updates_notice": "合理的な予告（30日）をもってこのポリシーを更新する権利を留保します。変更後の継続的な使用は承認とみなされます。"
    "updates_email": "重要な変更は、登録済みデベロッパーにメールで通知されます。"
    "contact_title": "お問い合わせ"
    "contact_info": "より高いレート制限、パートナーシップのお問い合わせ、ユースケースの相談、またはポリシーに関するご質問："
    "closing": "あなたの成功を望んでいます。フェアにプレイすれば、私たちがサポートします。"
